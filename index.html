<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TikTok Transfer</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#f7f7f7;color:#1a1a1a;-webkit-font-smoothing:antialiased;min-height:100vh}
.app{display:flex;flex-direction:column;align-items:center;padding:32px 16px 64px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:32px;animation:floatUp .5s ease forwards}
.header h1{font-size:1.5rem;font-weight:700;background:linear-gradient(to right,#1a1a1a,#737373);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.wrap{width:100%;max-width:420px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:20px}
.card+.card{margin-top:12px}
.search-box{position:relative}
.search-box input{width:100%;border:1px solid #e0e0e0;background:#efefef;border-radius:12px;padding:12px 16px 12px 42px;font-size:1rem;color:#1a1a1a;outline:none;font-family:inherit;transition:border .2s}
.search-box input:focus{border-color:#FE2C55;box-shadow:0 0 0 3px rgba(254,44,85,.15)}
.search-box input::placeholder{color:#737373}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#737373}
.suggestions{background:#fff;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;margin-top:12px}
.sug-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s}
.sug-item:hover{background:#f5f5f5}
.sug-item+.sug-item{border-top:1px solid #e0e0e0}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.avatar-sm{width:40px;height:40px;font-size:.9rem}
.avatar-md{width:56px;height:56px;font-size:1.1rem}
.user-info .name{font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:4px}
.user-info .stats{font-size:.75rem;color:#737373}
.selected-user{display:flex;align-items:center;gap:12px}
.clear-btn{background:none;border:none;color:#737373;cursor:pointer;padding:4px;transition:color .15s}
.clear-btn:hover{color:#1a1a1a}
label.field-label{font-size:.875rem;font-weight:600;color:#737373;display:block;margin-bottom:8px}
.amount-wrap{position:relative;margin-bottom:16px}
.amount-wrap .dollar{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.1rem;font-weight:700;color:#1a1a1a}
.amount-wrap input{width:100%;border:1px solid #e0e0e0;background:#efefef;border-radius:12px;padding:12px 16px 12px 36px;font-size:1.1rem;font-weight:600;color:#1a1a1a;outline:none;font-family:inherit;transition:border .2s}
.amount-wrap input:focus{border-color:#FE2C55;box-shadow:0 0 0 3px rgba(254,44,85,.15)}
.amount-wrap input::placeholder{color:#737373}
.fee-row{display:flex;justify-content:between;font-size:.875rem;padding:4px 0}
.fee-row span:first-child{color:#737373;flex:1}
.fee-row span:last-child{font-weight:600;color:#1a1a1a}
.fee-row .green{color:#16a34a}
.divider{height:1px;background:#e0e0e0;margin:8px 0}
.btn-tiktok{width:100%;padding:14px;border:none;border-radius:12px;background:#FE2C55;color:#fff;font-size:1.1rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:12px}
.btn-tiktok:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(254,44,85,.35)}
.btn-tiktok:active{transform:translateY(0)}
.btn-tiktok:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.back-btn{display:block;width:100%;text-align:center;background:none;border:none;color:#737373;font-size:.875rem;padding:12px;cursor:pointer;font-family:inherit;transition:color .15s;margin-top:4px}
.back-btn:hover{color:#1a1a1a}
.center{text-align:center}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:24px}
.spinner{position:relative;width:80px;height:80px}
.spinner .ring{position:absolute;inset:0;border-radius:50%;background:#FE2C55;opacity:.3;animation:pulseRing 1.2s cubic-bezier(.215,.61,.355,1) infinite}
.spinner .core{position:absolute;inset:8px;border-radius:50%;background:#FE2C55;animation:spinLoader 1.5s linear infinite}
.spinner .inner{position:absolute;inset:16px;border-radius:50%;background:#f7f7f7}
.success-icon{width:80px;height:80px;border-radius:50%;background:#16a34a;display:flex;align-items:center;justify-content:center}
.success-icon path{animation:checkDraw .5s ease forwards .3s}
.mini-logo{display:inline-block;vertical-align:middle;margin-left:2px}
.space-y>*+*{margin-top:12px}
.animate-in{animation:floatUp .5s ease forwards}
@keyframes floatUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
@keyframes pulseRing{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.2);opacity:0}}
@keyframes spinLoader{to{transform:rotate(360deg)}}
@keyframes checkDraw{0%{stroke-dashoffset:50}100%{stroke-dashoffset:0}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const USERNAMES=["charlidamelio","addisonre","bellapoarch","khaborekhy","zachking","spencerx","lorengray","babyariel","gilmhercroes","raborekhy","jamescharles","dixiedamelio","avanigregg","chasehudson","noahbeck","larrayeeee","tonilopez","bfrxnkk","thehypehouse","ondreaz","domelipa","maborekhy","ameliezilber","riyaz.14","jannat_zubair29","naborekhy","faaborekhy","nagmanisha","avneetkaur_13","aaborekhy","nishaguragain","bbaborekhy","arianagrande","therock","kyliejenner","selenagomez","taylorswift","justinbieber","ddamiliooo","iaborekhy","kaaborekhy","maborekhy2","kingbach","loren","jaborekhy","willsmith","lizzo","jasonderulo","dualipa","billieeilish","postmalone","snoopdogg","shakira","nickiminaj","champagnepapi","cardib","badgalriri","travisscott","kaborekhy2","eminem","justintimberlake","kevinhart4real","theellenshow","fallontonight","kimkardashian","kyliecosmetics","gigihadid","zayn","harrystyles","niallhoran","liampayne","louistomlinson","shawnmendes","camilacabello","halsey","khalid","sza","danielcaesar","frankocean","thewknd","wizkid","burnaboygram","davido","taborekhy","paborekhy","chaborekhy","raborekhy2","saborekhy","daborekhy","waborekhy","eaborekhy","qaborekhy","zaborekhy","xaborekhy","vaborekhy","uaborekhy","yaborekhy","oaborekhy","lababrekhyy","mababrekhyy","johndoe","janedoe","cooluser123","tiktoker99","viralstar","dancequeen","comedyking","prankster","foodlover","travelbug","fitnessguru","techgeek","musiclover","artsy_soul","bookworm","gamerlife","fashionista","petlover","naturelover","sportsfan","movielover","diyqueen","beautyboss","skaterdude","yogagirl","cheflife","djlife","photographer","filmmaker","animator","singer","rapper","dancer","actor","model","influencer","vlogger","streamer","podcaster","blogger","reviewer","tutor","mentor","coach","trainer","healer","artist","painter","sculptor","musician","guitarist","pianist","drummer","violinist","cellist","flutist","saxplayer","trumpeter","producer","songwriter","lyricist","composer","conductor","arranger","mixer","engineer","designer","architect","developer","coder","hacker","maker","builder","creator","innovator","inventor","pioneer","explorer","adventurer","traveler","wanderer","nomad","backpacker","camper","hiker","climber","surfer","skater","snowboarder","skier","cyclist","runner","swimmer","diver","sailor","pilot","astronaut","scientist","researcher","professor","teacher","student","learner","reader","writer","author","poet","playwright","screenwriter","journalist","reporter","editor","publisher","librarian","archivist","curator","collector","dealer","broker","trader","investor","banker","accountant","auditor","analyst","consultant","advisor","strategist","planner","manager","director","executive","officer","chief","president","chairman","founder","cofounder","partner","associate","assistant","intern","volunteer","activist","advocate","campaigner","organizer","coordinator","facilitator","mediator","negotiator","diplomat","ambassador","envoy","delegate","representative","senator","governor","mayor","council","commissioner","inspector","detective","officer123","agent","spy","ninja","samurai","warrior","knight","prince","princess","queen","king"];
const COLORS=["#FE2C55","#25F4EE","#5B5EA6","#9B59B6","#E67E22","#1ABC9C","#E74C3C","#3498DB","#F39C12","#2ECC71","#8E44AD","#D35400","#16A085","#C0392B","#2980B9"];
const FEE=1;
function seed(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}
function genUser(u){const s=seed(u);const f=((s%900)+100)+"."+(s%10)+"K";const fw=((s%50)+5)+"."+(s%10)+"K";return{username:u,followers:f,following:fw,color:COLORS[s%COLORS.length]}}
function searchUsers(q){if(!q||q.length<1)return[];const low=q.toLowerCase();return USERNAMES.filter(u=>u.includes(low)).slice(0,6).map(genUser)}
const LOGO_BW='<svg width="28" height="28" viewBox="0 0 48 48" fill="none"><path d="M33.3 8.1C31.8 6.4 31 4.2 31 2h-7.2v29.6c0 3-2.5 5.4-5.5 5.4s-5.5-2.4-5.5-5.4 2.5-5.4 5.5-5.4c.6 0 1.1.1 1.6.3v-7.3c-.5-.1-1.1-.1-1.6-.1-7 0-12.7 5.7-12.7 12.6S11.3 44.3 18.3 44.3s12.7-5.7 12.7-12.6V16.5c2.7 1.9 5.9 3 9.4 3V12.3c-3.4 0-6.4-1.7-7.1-4.2z" fill="#1a1a1a"/></svg>';
const MINI='<svg class="mini-logo" width="14" height="14" viewBox="0 0 48 48"><path d="M33.3 8.1C31.8 6.4 31 4.2 31 2h-7.2v29.6c0 3-2.5 5.4-5.5 5.4s-5.5-2.4-5.5-5.4 2.5-5.4 5.5-5.4c.6 0 1.1.1 1.6.3v-7.3c-.5-.1-1.1-.1-1.6-.1-7 0-12.7 5.7-12.7 12.6S11.3 44.3 18.3 44.3s12.7-5.7 12.7-12.6V16.5c2.7 1.9 5.9 3 9.4 3V12.3c-3.4 0-6.4-1.7-7.1-4.2z" fill="#1a1a1a"/></svg>';
const SEARCH_ICON='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>';

let state={stage:"main",user:null,query:"",amount:"",tx:null};
const $=id=>document.getElementById(id);
const app=document.getElementById("app");

function avatar(u,size){const c=size==="sm"?"avatar-sm":"avatar-md";return`<div class="avatar ${c}" style="background:${u.color}">${u.username.charAt(0).toUpperCase()}</div>`}
function fmtTime(d){return d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}

function render(){
const s=state;
let h="";
h+=`<div class="header">${LOGO_BW}<h1>Payment</h1></div><div class="wrap">`;

if(s.stage==="main"){
h+='<div class="space-y animate-in">';
if(s.user){
h+=`<div class="card"><div class="selected-user">${avatar(s.user,"md")}<div style="flex:1;min-width:0"><div class="user-info"><div class="name">@${s.user.username}${MINI}</div><div class="stats">${s.user.followers} followers · ${s.user.following} following</div></div></div><button class="clear-btn" onclick="clearUser()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div></div>`;
}else{
h+=`<div class="search-box">${SEARCH_ICON}<input type="text" placeholder="Search TikTok username..." value="${s.query}" oninput="onSearch(this.value)" autofocus/></div><div class="suggestions-container">`;
const sug=searchUsers(s.query);
if(sug.length){
h+='<div class="suggestions">';
sug.forEach(u=>{h+=`<div class="sug-item" onclick="selectUser('${u.username}')">${avatar(u,"sm")}<div class="user-info"><div class="name">@${u.username}${MINI}</div><div class="stats">${u.followers} followers · ${u.following} following</div></div></div>`});
h+='</div>';
}
h+='</div>';}
const amt=parseFloat(s.amount)||0;const recv=Math.max(0,amt-FEE);const canSend=s.user&&amt>FEE;
h+=`<div class="card"><label class="field-label">Enter Amount (USD)</label><div class="amount-wrap"><span class="dollar">$</span><input type="number" placeholder="0.00" value="${s.amount}" oninput="onAmount(this.value)" min="0" step="0.01"/></div><div class="fee-display">`;
if(amt>0){
h+=`<div class="fee-row"><span>Fee</span><span>$1.00</span></div><div class="divider"></div><div class="fee-row"><span>Received amount</span><span class="green">$${recv.toFixed(2)}</span></div>`;
}
h+=`</div><button class="btn-tiktok" ${canSend?"":"disabled"} onclick="startTransfer()">Transfer</button></div></div>`;
}

if(s.stage==="confirm"&&s.user&&s.tx){
const u=s.user,t=s.tx;
h+=`<div class="space-y animate-in"><h2 class="center" style="font-size:1.25rem;font-weight:700">Confirm Transfer</h2><div class="card"><div class="selected-user" style="padding-bottom:12px;border-bottom:1px solid #e0e0e0">${avatar(u,"md")}<div class="user-info"><div class="name">@${u.username}${MINI}</div><div class="stats">${u.followers} followers</div></div></div><div class="fee-row" style="margin-top:12px"><span>Amount</span><span>USD $${t.sent}</span></div><div class="divider"></div><div class="fee-row"><span>Fee</span><span>USD $1.00</span></div><div class="divider"></div><div class="fee-row"><span>Received amount</span><span class="green">USD $${t.recv}</span></div><div class="divider"></div><div class="fee-row"><span>Arrival time</span><span>~30 min (${t.arrival})</span></div></div><button class="btn-tiktok" onclick="confirmSend()">Confirm & Send</button><button class="back-btn" onclick="goBack()">← Back</button></div>`;
}

if(s.stage==="loading"){
h+=`<div class="loading animate-in"><div class="spinner"><div class="ring"></div><div class="core"></div><div class="inner"></div></div><p style="color:#737373;font-weight:600">Processing transfer...</p></div>`;
}

if(s.stage==="success"&&s.user&&s.tx){
const u=s.user,t=s.tx;
h+=`<div class="space-y animate-in"><div style="display:flex;flex-direction:column;align-items:center;padding:24px 0;gap:16px"><div class="success-icon"><svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path d="M10 20L17 27L30 13" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="50" stroke-dashoffset="0"/></svg></div><p style="font-size:1.25rem;font-weight:700">USD $${t.sent} sent successfully</p></div><div class="card">`;
const rows=[["Sent to",`@${u.username} ${MINI}`],["Amount",`USD $${t.sent}`],["Fee","USD $1.00"],["Received",`<span class="green">USD $${t.recv}</span>`],["Status",`<span class="green">✓ Completed</span>`],["Time",t.time],["Arrival",`~30 min (${t.arrival})`]];
rows.forEach((r,i)=>{h+=`<div class="fee-row"><span>${r[0]}</span><span style="font-weight:600">${r[1]}</span></div>`;if(i<rows.length-1)h+='<div class="divider"></div>'});
h+=`</div><button class="btn-tiktok" onclick="resetAll()">Send USD Again</button></div>`;
}

h+='</div>';
app.innerHTML=h;
}

function onSearch(v){state.query=v;updateSuggestions()}
function updateSuggestions(){
  const sug=searchUsers(state.query);
  const suggestionsContainer=document.querySelector('.suggestions-container');
  if(suggestionsContainer){
    if(sug.length){
      let html='<div class="suggestions">';
      sug.forEach(u=>{html+=`<div class="sug-item" onclick="selectUser('${u.username}')">${avatar(u,"sm")}<div class="user-info"><div class="name">@${u.username}${MINI}</div><div class="stats">${u.followers} followers · ${u.following} following</div></div></div>`});
      html+='</div>';
      suggestionsContainer.innerHTML=html;
    }else{
      suggestionsContainer.innerHTML='';
    }
  }
}
function onAmount(v){state.amount=v;updateFeeDisplay()}
function updateFeeDisplay(){
  const amt=parseFloat(state.amount)||0;
  const recv=Math.max(0,amt-FEE);
  const feeDisplay=document.querySelector('.fee-display');
  if(feeDisplay){
    if(amt>0){
      feeDisplay.innerHTML=`<div class="fee-row"><span>Fee</span><span>$1.00</span></div><div class="divider"></div><div class="fee-row"><span>Received amount</span><span class="green">$${recv.toFixed(2)}</span></div>`;
    }else{
      feeDisplay.innerHTML='';
    }
  }
}
function selectUser(u){state.user=genUser(u);state.query="";render()}
function clearUser(){state.user=null;state.amount="";render()}
function startTransfer(){
if(!state.user)return;
const amt=parseFloat(state.amount)||0;if(amt<=FEE)return;
const now=new Date();const arr=new Date(now.getTime()+30*60*1000);
state.tx={sent:amt.toFixed(2),recv:Math.max(0,amt-FEE).toFixed(2),time:fmtTime(now),arrival:fmtTime(arr)};
state.stage="confirm";render();
}
function confirmSend(){state.stage="loading";render();setTimeout(()=>{state.stage="success";render()},2000)}
function goBack(){state.stage="main";render()}
function resetAll(){state={stage:"main",user:null,query:"",amount:"",tx:null};render()}

render();
</script>
</body>
</html>
